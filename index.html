<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>Beyond Fitness — Diet · Workout · Supplements</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="theme-color" content="#0b0d12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Beyond Fitness" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <img class="logo" src="icons/icon-192.png" alt="Beyond Fitness logo" />
    <div class="header-titles">
      <h1 id="pageTitle">Today</h1>
      <span class="subtitle">Beyond Fitness · <span id="todayDisplay"></span></span>
    </div>
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
      <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    </button>
    <div class="streak-pill" id="streakPill" title="Consecutive days logged">🔥 0</div>
  </div>
</header>

<main id="app">

  <!-- TODAY -->
  <section class="tab-panel active" id="panel-today">
    <div class="card day-strip-card">
      <div class="day-strip-head">
        <span>Your 7-day split</span>
        <span class="day-strip-current" id="todayTypeBadge"></span>
      </div>
      <div class="day-strip" id="daySelector"></div>
    </div>

    <div class="card rings-card">
      <div class="rings-row" id="ringsRow"></div>
    </div>

    <div class="card">
      <h2>Today's Checklist Snapshot</h2>
      <div id="todaySnapshot" class="snapshot-grid"></div>
    </div>

    <div class="card">
      <h2>Notes for Today</h2>
      <textarea id="dayNotes" placeholder="Energy levels, hunger, soreness, anything worth logging..."></textarea>
    </div>
  </section>

  <!-- DIET -->
  <section class="tab-panel" id="panel-diet">
    <div id="dietContent"></div>
  </section>

  <!-- WORKOUT -->
  <section class="tab-panel" id="panel-workout">
    <div id="workoutContent"></div>
  </section>

  <!-- SUPPLEMENTS -->
  <section class="tab-panel" id="panel-supplements">
    <div id="supplementsContent"></div>
  </section>

  <!-- HISTORY -->
  <section class="tab-panel" id="panel-history">
    <div class="card">
      <div class="history-header">
        <h2>Daily Log History</h2>
        <div class="history-actions">
          <button class="btn btn-primary" id="exportCsvBtn">Export Sheet (CSV)</button>
          <button class="btn btn-secondary" id="exportJsonBtn">Backup (JSON)</button>
          <label class="btn btn-secondary file-btn">
            Restore Backup
            <input type="file" id="importJsonInput" accept="application/json" hidden />
          </label>
        </div>
      </div>
      <div id="historyList" class="history-list"></div>
      <p class="empty-hint" id="historyEmptyHint">No days logged yet — check items off in the Diet, Workout, and Supplements tabs and they'll show up here.</p>
    </div>

    <div class="card">
      <p><strong>Disclaimer:</strong> <span id="disclaimerText"></span></p>
      <p class="coach-line" id="coachLine"></p>
    </div>
  </section>

</main>

<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" data-tab="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.2 3.2"/></svg>
    <span>Today</span>
  </button>
  <button class="nav-btn" data-tab="diet">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v7a2 2 0 0 0 2 2v9"/><path d="M7 3v5"/><path d="M10 3v5"/><path d="M17 3c-1.7 0-3 1.8-3 5s1.3 5 3 5v9"/></svg>
    <span>Diet</span>
  </button>
  <button class="nav-btn" data-tab="workout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8v8"/><path d="M2 10v4"/><path d="M20 8v8"/><path d="M22 10v4"/><rect x="6" y="6" width="3" height="12" rx="1"/><rect x="15" y="6" width="3" height="12" rx="1"/><path d="M9 12h6"/></svg>
    <span>Workout</span>
  </button>
  <button class="nav-btn" data-tab="supplements">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="10" rx="5" transform="rotate(-45 12 14)"/><path d="M12 14 L16.5 9.5" stroke-width="2"/></svg>
    <span>Supps</span>
  </button>
  <button class="nav-btn" data-tab="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V9"/><path d="M10 19V5"/><path d="M16 19v-7"/><path d="M22 19v-3"/></svg>
    <span>History</span>
  </button>
</nav>

<div id="toast" class="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
